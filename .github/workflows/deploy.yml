name: Deploy to flowpro.dev

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 146.59.92.14
          username: ubuntu
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "public/"
          target: "/srv/apps/flowpro-dev/"
          strip_components: 1
