# Nginx config for flowpro.by
# Place at: /srv/infrastructure/nginx/conf.d/flowpro-by.conf

server {
    listen 80;
    server_name flowpro.by www.flowpro.by;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://flowpro.by$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name www.flowpro.by;

    ssl_certificate     /etc/letsencrypt/live/flowpro.by/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/flowpro.by/privkey.pem;

    return 301 https://flowpro.by$request_uri;
}

server {
    listen 443 ssl;
    server_name flowpro.by;

    ssl_certificate     /etc/letsencrypt/live/flowpro.by/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/flowpro.by/privkey.pem;

    root /srv/apps/flowpro-dev;
    index by.html;

    location / {
        try_files $uri $uri/ /by.html;
    }

    gzip on;
    gzip_types text/html text/css application/javascript image/svg+xml image/png;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
}
