# Nginx config for flowpro.dev
# Place at: /srv/infrastructure/nginx/conf.d/flowpro.conf

server {
    listen 80;
    server_name flowpro.dev www.flowpro.dev;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://flowpro.dev$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name www.flowpro.dev;

    ssl_certificate     /etc/letsencrypt/live/flowpro.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/flowpro.dev/privkey.pem;

    return 301 https://flowpro.dev$request_uri;
}

server {
    listen 443 ssl;
    server_name flowpro.dev;

    ssl_certificate     /etc/letsencrypt/live/flowpro.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/flowpro.dev/privkey.pem;

    root /srv/apps/flowpro-dev;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/html text/css application/javascript image/svg+xml image/png;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
}
