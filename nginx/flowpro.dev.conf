# Nginx config for flowpro.dev
# Place at: /etc/nginx/sites-available/flowpro.dev
# Then: ln -s /etc/nginx/sites-available/flowpro.dev /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name flowpro.dev www.flowpro.dev;

    # Redirect HTTP → HTTPS
    return 301 https://flowpro.dev$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.flowpro.dev;

    ssl_certificate     /etc/letsencrypt/live/flowpro.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/flowpro.dev/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Redirect www → non-www
    return 301 https://flowpro.dev$request_uri;
}

server {
    listen 443 ssl http2;
    server_name flowpro.dev;

    ssl_certificate     /etc/letsencrypt/live/flowpro.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/flowpro.dev/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/flowpro.dev;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/html text/css application/javascript image/svg+xml;
    gzip_min_length 1024;

    # Cache static assets
    location ~* \.(css|js|woff2?|png|jpg|svg|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
