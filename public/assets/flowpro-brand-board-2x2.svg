<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
<title id="title">FlowPro logo presentation grid</title>
<desc id="desc">Four panel grid showing FlowPro wordmark and icon on dark and white backgrounds.</desc>

<style>
  .wordmark { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; font-weight: 900; letter-spacing: -0.03em; }
  .mark-bar { fill: #2563EB; }
</style>

<rect x="0" y="0" width="600" height="600" fill="#0B1120"/>
<rect x="600" y="0" width="600" height="600" fill="#FFFFFF"/>
<rect x="0" y="600" width="600" height="600" fill="#0B1120"/>
<rect x="600" y="600" width="600" height="600" fill="#FFFFFF"/>

<!-- Top-left: full logo on dark -->
<g transform="translate(70 262)">
  
<g transform="scale(1.1)">
  <rect class="mark-bar" x="8" y="14" width="48" height="8" rx="4"/>
  <rect class="mark-bar" x="8" y="28" width="36" height="8" rx="4"/>
  <rect class="mark-bar" x="8" y="42" width="24" height="8" rx="4"/>
</g>
</g>
<text class="wordmark" x="175" y="330" font-size="76">
  <tspan fill="#FFFFFF">Flow</tspan><tspan fill="#2563EB">Pro</tspan>
</text>

<!-- Top-right: full logo on white -->
<g transform="translate(670 262)">
  
<g transform="scale(1.1)">
  <rect class="mark-bar" x="8" y="14" width="48" height="8" rx="4"/>
  <rect class="mark-bar" x="8" y="28" width="36" height="8" rx="4"/>
  <rect class="mark-bar" x="8" y="42" width="24" height="8" rx="4"/>
</g>
</g>
<text class="wordmark" x="775" y="330" font-size="76">
  <tspan fill="#0F172A">Flow</tspan><tspan fill="#2563EB">Pro</tspan>
</text>

<!-- Bottom-left: icon on dark -->
<g transform="translate(223.2 823.2)">
  
<g transform="scale(2.4)">
  <rect class="mark-bar" x="8" y="14" width="48" height="8" rx="4"/>
  <rect class="mark-bar" x="8" y="28" width="36" height="8" rx="4"/>
  <rect class="mark-bar" x="8" y="42" width="24" height="8" rx="4"/>
</g>
</g>

<!-- Bottom-right: icon on white -->
<g transform="translate(823.2 823.2)">
  
<g transform="scale(2.4)">
  <rect class="mark-bar" x="8" y="14" width="48" height="8" rx="4"/>
  <rect class="mark-bar" x="8" y="28" width="36" height="8" rx="4"/>
  <rect class="mark-bar" x="8" y="42" width="24" height="8" rx="4"/>
</g>
</g>
</svg>
