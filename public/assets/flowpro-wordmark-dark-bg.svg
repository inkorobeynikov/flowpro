<svg xmlns="http://www.w3.org/2000/svg" width="720" height="200" viewBox="0 0 720 200" role="img" aria-labelledby="title desc">
<title id="title">FlowPro wordmark logo</title>
<desc id="desc">A minimal FlowPro wordmark with a three-line flow mark, using deep navy and electric blue.</desc>

<style>
  .wordmark { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; font-weight: 900; letter-spacing: -0.03em; }
  .mark-bar { fill: #2563EB; }
</style>

<rect width="720" height="200" fill="#0B1120"/>
<g transform="translate(72 68)">
  
<g transform="scale(1.25)">
  <rect class="mark-bar" x="8" y="14" width="48" height="8" rx="4"/>
  <rect class="mark-bar" x="8" y="28" width="36" height="8" rx="4"/>
  <rect class="mark-bar" x="8" y="42" width="24" height="8" rx="4"/>
</g>
</g>
<text class="wordmark" x="185" y="123" font-size="64" fill="#FFFFFF">
  <tspan fill="#FFFFFF">Flow</tspan><tspan fill="#2563EB">Pro</tspan>
</text>
</svg>
